x-vrm-cluster-env: &vrm-cluster-env
    VRM_LOG_LEVEL: DEBUG
    VRM_LICENSE: '{"version":"v1","customer_id":"Vroom-Test","license_type":"freemium","storage_cap_gib":1048576,"signature":"E5ulpGbxd5F5mHQA8r0RKxK+nFUKc7dAMHHJxgrNsPEJuqhj54F6LfDx0RAY2vFNPvkYmkwNy8LvJIv9UqS1Bw=="}'

x-vrm-cluster-build: &vrm-cluster-build
    context: ..
    dockerfile: docker/Dockerfile.cluster

x-vrm-cluster-service: &vrm-cluster-service
    build: *vrm-cluster-build
    image: vrm-core:ci
    restart: on-failure

services:
    db:
        image: postgres:17.9
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: vrm
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 10

    db-init:
        build:
            context: ..
            dockerfile: docker/Dockerfile.db-init
        depends_on:
            db:
                condition: service_healthy
        environment:
            DB_USER: postgres
            DB_HOST: db
            DB_PORT: 5432
            PGPASSWORD: vrm
        restart: "no"

    user-init:
        <<: *vrm-cluster-service
        command:
            - /bin/sh
            - -c
            - >-
                vrm-access user-add --superuser --if-not-exists "$$VRM_ROOT_USER" 'root:::' &&
                vrm-access key-add "$$VRM_ROOT_USER" "$$VRM_ROOT_ACCESS_KEY" "$$VRM_ROOT_SECRET_KEY" 2000000000
        depends_on:
            db-init:
                condition: service_completed_successfully
        environment:
            VRM_DB_HOSTPORT: db:5432
            VRM_DB_USER: postgres
            VRM_DB_PASS: vrm
            VRM_ROOT_USER:
            VRM_ROOT_ACCESS_KEY:
            VRM_ROOT_SECRET_KEY:
        restart: "no"

    etcd:
        image: quay.io/coreos/etcd:v3.5.12
        command:
            - etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd:2379

    storage:
        <<: *vrm-cluster-service
        command: ["/usr/local/bin/vrm-cluster", "--registry", "http://etcd:2379", "storage"]
        depends_on:
            - etcd
            - coordinator
        environment:
            <<: *vrm-cluster-env
            VRM_STORAGE_GROUP_ID: 0

    deduplicator:
        <<: *vrm-cluster-service
        command: ["/usr/local/bin/vrm-cluster", "--registry", "http://etcd:2379", "deduplicator"]
        depends_on:
            - etcd
            - coordinator
            - storage
        environment:
            <<: *vrm-cluster-env

    coordinator:
        <<: *vrm-cluster-service
        command: ["/usr/local/bin/vrm-cluster", "--registry", "http://etcd:2379", "coordinator"]
        depends_on:
            user-init:
                condition: service_completed_successfully
            etcd:
                condition: service_started
        environment:
            <<: *vrm-cluster-env
            VRM_DB_HOSTPORT: db:5432
            VRM_DB_USER: postgres
            VRM_DB_PASS: vrm
            VRM_STORAGE_GROUPS: '[{"id":0,"type":"ROUND_ROBIN","storages":1}]'

    entrypoint:
        <<: *vrm-cluster-service
        command: ["/usr/local/bin/vrm-cluster", "--registry", "http://etcd:2379", "entrypoint"]
        depends_on:
            user-init:
                condition: service_completed_successfully
            etcd:
                condition: service_started
            coordinator:
                condition: service_started
            storage:
                condition: service_started
            deduplicator:
                condition: service_started
        environment:
            <<: *vrm-cluster-env
            VRM_DB_HOSTPORT: db:5432
            VRM_DB_USER: postgres
            VRM_DB_PASS: vrm
        volumes:
            - ./policies.json:/etc/vrm/policies.json:ro
        ports:
            - 8080:8080
