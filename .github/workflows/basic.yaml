name: Basic PR checks

on:
    pull_request:
        types: [opened, synchronize]
        branches:
            - master

jobs:
    build-and-test:
        env:
            CXX: clang++
            CC: clang
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stjank/uh-build-container/build:v2

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ccache
                  key: ccache-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ccache-${{ github.ref_name }}-
                      ccache-

            - name: Build
              run: |
                  cmake --preset default -DENABLE_CCACHE=ON
                  cmake --build build

            - name: Test
              run: ctest --test-dir build

            - name: Upload test log
              uses: actions/upload-artifact@v4
              with:
                  name: test-log
                  path: build/Testing/Temporary/LastTest.log

            - name: Upload binaries
              uses: actions/upload-artifact@v4
              with:
                  name: binaries
                  path: build/bin

    integration-tests:
        needs: build-and-test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Checkout s3-tests
              uses: actions/checkout@v4
              with:
                  repository: ceph/s3-tests
                  # Pin to a known-good commit so CI is deterministic and does
                  # not break when ceph/s3-tests adds tests for unimplemented
                  # features upstream. Bump deliberately to pick up new coverage.
                  ref: 5522d1c351f75bc00ae0f64f742f3f095f5939d9
                  path: test/feature/s3-tests

            - uses: actions/download-artifact@v4
              with:
                  name: binaries
                  path: build/bin

            - name: Make binaries executable
              run: chmod +x build/bin/*

            - name: Install s3-tests dependencies
              run: python3 -m pip install -r test/feature/s3-tests/requirements.txt

            - name: Start cluster
              run: runtime/cluster.sh start --docker --bin-dir build/bin

            - name: Run integration tests
              run: test/feature/run_test.sh

            - name: Upload cluster logs
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: cluster-logs
                  path: .cluster/logs
                  if-no-files-found: ignore

            - name: Stop cluster
              if: always()
              run: runtime/cluster.sh stop

    hadoop-s3a-tests:
        needs: build-and-test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/download-artifact@v4
              with:
                  name: binaries
                  path: build/bin

            - name: Make binaries executable
              run: chmod +x build/bin/*

            - name: Start cluster
              run: runtime/cluster.sh start --docker --bin-dir build/bin

            - name: Run Hadoop S3A tests
              run: test/feature/run_hadoop_test.sh

            - name: Upload cluster logs
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: hadoop-cluster-logs
                  path: .cluster/logs
                  if-no-files-found: ignore

            - name: Stop cluster
              if: always()
              run: runtime/cluster.sh stop
