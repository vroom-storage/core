---
name: Vroom Energy/Carbon benchmark
author: Max Plauth <max@vroom.io>
description: This usage_scenario sets up a VRM cluster and measures it carbon footprint using the stability test workflow.

compose-file: !include compose.yml

services:
  storage:
    setup-commands:
      - sleep 5

flow:
  - name: Upload data
    container: stability
    commands:
      - type: console
        command: /testing/howto-vrm/scripts/boto3/multithread_upload/vrm_upload.py -B gmt-test --url http://entrypoint:8080 /data
        note: Upload test data to vrm cluster
        ignore-errors: true
        log-stdout: false
        log-stderr: false
  - name: Download data
    container: stability
    commands:
      - type: console
        command: /testing/howto-vrm/scripts/boto3/multithread_download/vrm_download.py --url http://entrypoint:8080 gmt-test
        note: Download test data from vrm cluster
        ignore-errors: true
        log-stdout: false
        log-stderr: false
